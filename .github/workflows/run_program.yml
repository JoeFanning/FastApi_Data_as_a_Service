name: Execute My Cloud Program

on:
  workflow_dispatch:
    inputs:
      custom_msg:
        description: 'Filter Text passed from FastAPI Dashboard'
        required: false
        default: ''

jobs:
  run-logic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Data Libraries
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      # 🌟 THIS MAKES YOUR DATA SCRIPT AWARE OF THE TEXT PASSED
      - name: Execute Data Analytics Program
        env:
          FILTER_TEXT: ${{ github.event.inputs.custom_msg }}
        run: python process_data.py

      - name: Commit and Push Generated Excel Sheet
        env:
          GITHUB_TOKEN: ${{ secrets.FASTAPI_DATA_AS_A_SERVICE }}
        run: |
          git config --global user.name "DaaS Pipeline Bot"
          git config --global user.email "bot@github.com"
          git add Premium_Undervalued_Deals.xlsx
          git commit -m "Automated Data Refresh: Premium Excel sheet generated" || echo "No changes to commit"
          git push
